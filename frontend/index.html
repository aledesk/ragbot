<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente Distribuidora Norte</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f4f4f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
  .chat-wrap { width: 100%; max-width: 720px; height: 94vh; background: #fff; border-radius: 16px; border: 1px solid #e4e4e7; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.07); }
  .header { padding: 16px 20px; border-bottom: 1px solid #e4e4e7; background: #f9fafb; display: flex; align-items: center; gap: 12px; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; font-size: 15px; flex-shrink: 0; }
  .header-info h1 { font-size: 15px; font-weight: 600; color: #111; }
  .header-info p { font-size: 12px; color: #888; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; margin-left: auto; }
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .msg { display: flex; gap: 10px; max-width: 85%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot { align-self: flex-start; }
  .msg-av { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; }
  .msg.bot .msg-av { background: #e6f7f1; color: #0F6E56; }
  .msg.user .msg-av { background: #f0f0f0; color: #555; }
  .bubble { padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.6; }
  .msg.bot .bubble { background: #f4f4f5; color: #111; border-bottom-left-radius: 4px; }
  .msg.user .bubble { background: #1D9E75; color: #fff; border-bottom-right-radius: 4px; }
  .sources { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 5px; }
  .source-tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #e6f7f1; color: #0F6E56; border: 1px solid #9FE1CB; }
  .typing { display: flex; gap: 4px; align-items: center; padding: 10px 14px; background: #f4f4f5; border-radius: 14px; border-bottom-left-radius: 4px; width: fit-content; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: #1D9E75; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
  .suggestions { padding: 0 20px 12px; display: flex; gap: 8px; flex-wrap: wrap; }
  .sug { font-size: 12px; padding: 6px 12px; border-radius: 20px; border: 1px solid #d4d4d8; background: #fff; color: #555; cursor: pointer; }
  .sug:hover { background: #f4f4f5; color: #111; }
  .input-area { padding: 12px 16px; border-top: 1px solid #e4e4e7; display: flex; gap: 10px; align-items: flex-end; background: #f9fafb; }
  textarea { flex: 1; border: 1px solid #d4d4d8; border-radius: 10px; padding: 10px 14px; font-size: 14px; font-family: inherit; resize: none; outline: none; min-height: 42px; max-height: 100px; background: #fff; }
  textarea:focus { border-color: #1D9E75; }
  button.send { width: 42px; height: 42px; border-radius: 10px; background: #1D9E75; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  button.send:hover { background: #0F6E56; }
  button.send svg { fill: none; stroke: #fff; stroke-width: 2; }
  button.send:disabled { background: #d4d4d8; cursor: not-allowed; }
  .error { font-size: 12px; color: #b91c1c; background: #fef2f2; border: 1px solid #fca5a5; padding: 8px 12px; border-radius: 8px; }
  .footer { font-size: 11px; color: #aaa; text-align: center; padding: 6px; }
</style>
</head>
<body>
<div class="chat-wrap">
  <div class="header">
    <div class="avatar">DN</div>
    <div class="header-info">
      <h1>Asistente Distribuidora Norte</h1>
      <p>Consultas de catálogo · precios · condiciones</p>
    </div>
    <div class="dot"></div>
  </div>
  <div class="messages" id="msgs">
    <div class="msg bot">
      <div class="msg-av">DN</div>
      <div>
        <div class="bubble">¡Hola! Soy el asistente de Distribuidora Norte. Podés consultarme precios, stock, condiciones de pago, descuentos y zonas de entrega. ¿En qué te puedo ayudar?</div>
      </div>
    </div>
  </div>
  <div class="suggestions" id="sugs">
    <button class="sug" onclick="useSug(this)">¿Qué descuentos hay por volumen?</button>
    <button class="sug" onclick="useSug(this)">Precio del auricular Bluetooth</button>
    <button class="sug" onclick="useSug(this)">¿Cómo es el envío al interior?</button>
    <button class="sug" onclick="useSug(this)">Stock freidora de aire</button>
  </div>
  <div class="input-area">
    <textarea id="inp" rows="1" placeholder="Consultá precios, stock, condiciones..."
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
    <button class="send" id="btn" onclick="send()">
      <svg width="18" height="18" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="footer">Conectado al backend RAG local · puerto 8000</div>
</div>
<script>
function addMsg(role, text, sources) {
  const c = document.getElementById('msgs');
  const w = document.createElement('div');
  w.className = 'msg ' + role;
  const av = role === 'bot' ? 'DN' : 'Vos';
  let h = `<div class="msg-av">${av}</div><div><div class="bubble">${text.replace(/\n/g,'<br>')}</div>`;
  if (sources && sources.length) {
    h += '<div class="sources">';
    sources.forEach(s => { h += `<span class="source-tag">Pág. ${s.page} · ${Math.round(s.relevancia*100)}%</span>`; });
    h += '</div>';
  }
  h += '</div>';
  w.innerHTML = h;
  c.appendChild(w);
  c.scrollTop = c.scrollHeight;
}
function addTyping() {
  const c = document.getElementById('msgs');
  const w = document.createElement('div');
  w.className = 'msg bot'; w.id = 'typing';
  w.innerHTML = '<div class="msg-av">DN</div><div class="typing"><span></span><span></span><span></span></div>';
  c.appendChild(w); c.scrollTop = c.scrollHeight;
}
function removeTyping() { const e = document.getElementById('typing'); if(e) e.remove(); }
function useSug(btn) {
  document.getElementById('inp').value = btn.textContent;
  document.getElementById('sugs').style.display = 'none';
  send();
}
async function send() {
  const inp = document.getElementById('inp');
  const txt = inp.value.trim();
  if (!txt) return;
  document.getElementById('btn').disabled = true;
  document.getElementById('sugs').style.display = 'none';
  addMsg('user', txt);
  inp.value = ''; inp.style.height = 'auto';
  addTyping();
  try {
    const r = await fetch('http://localhost:8000/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({pregunta: txt})
    });
    removeTyping();
    if (!r.ok) { addMsg('bot', '⚠️ Error del servidor. Intentá de nuevo.'); }
    else { const d = await r.json(); addMsg('bot', d.respuesta, d.fuentes); }
  } catch(e) {
    removeTyping();
    const err = document.createElement('div');
    err.className = 'error'; err.style.margin = '0 20px 10px';
    err.textContent = '❌ No se pudo conectar al backend. Verificá que el servidor esté corriendo.';
    document.getElementById('msgs').appendChild(err);
  }
  document.getElementById('btn').disabled = false;
  inp.focus();
}
</script>
</body>
</html>
